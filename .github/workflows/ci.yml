name: CI

# Lints, type-checks, tests, and verifies SPDX headers on every push
# and pull request. Nothing is published — just a quality gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — check
        run: ruff check .

      # Note: `ruff format --check` is intentionally not enabled yet.
      # The codebase has not been run through `ruff format`, and doing so
      # would rewrite whitespace across many files. Adding this check is
      # a future improvement; for now, `ruff check` catches real issues.

  # ─── SPDX headers ────────────────────────────────────────────────────
  spdx:
    name: SPDX Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify SPDX headers
        run: python tools/add_spdx_headers.py --check

  # ─── Tests ───────────────────────────────────────────────────────────
  # The pure-Python tests in tests/ use stubs in conftest.py instead of
  # the real PySide6 binary stack. This is deliberate: the tests cover
  # pure logic (version parsing, tag classification, CSV formatting,
  # session-state transitions), not Qt widget behavior. Installing real
  # PySide6 would override the stubs and require a full Qt environment
  # on every CI runner — expensive, flaky, and pointless for these tests.
  test:
    name: Test — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest
