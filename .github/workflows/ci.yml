name: CI

# Lints, type-checks, tests, and verifies SPDX headers on every push
# and pull request. Nothing is published — just a quality gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff — check
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

  # ─── SPDX headers ────────────────────────────────────────────────────
  spdx:
    name: SPDX Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify SPDX headers
        run: python tools/add_spdx_headers.py --check

  # ─── Tests ───────────────────────────────────────────────────────────
  # Tests run on Windows + Linux. macOS is excluded only because no
  # PySide6 CI runners have historically needed it; adding it is a
  # one-line change if someone asks.
  test:
    name: Test — Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Linux display dependencies (for Qt)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 xvfb

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt

      - name: Run tests (Linux — with xvfb for Qt)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: pytest
