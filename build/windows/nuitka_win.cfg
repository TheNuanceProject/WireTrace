# WireTrace Nuitka Windows Configuration
# Referenced by build.py — all flags are also set programmatically
# This file serves as documentation of the build flags used.

[nuitka]
standalone = true
onefile = false
enable-plugin = pyside6
windows-console-mode = disable
windows-icon-from-ico = resources/app_icon.ico
product-name = WireTrace
product-version = 1.0.0
company-name = The Nuance Project
file-description = Professional Serial Data Monitor
copyright = © 2026 The Nuance Project
include-data-dir = resources=resources
include-data-dir = ui/themes=ui/themes
